services:
  - type: web
    name: you-space
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: APP_BASE_URL
        value: https://you-space.onrender.com
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: IMPORT_LEGACY_SECRET
        sync: false
      - key: LEGACY_BASE_URL
        value: https://you-space-app-1.onrender.com
      - key: LEGACY_CATEGORY_IDS
        sync: false
      - key: STRIPE_CHECKOUT_MONTHLY_URL
        sync: false
      - key: STRIPE_CHECKOUT_YEARLY_URL
        sync: false
      - key: PAYPAL_CHECKOUT_MONTHLY_URL
        sync: false
      - key: PAYPAL_CHECKOUT_YEARLY_URL
        sync: false
